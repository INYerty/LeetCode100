<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T438 findAnagrams 逻辑演示</title>
<style>
  :root {
    --bg: #ffffff;
    --bg2: #f5f5f4;
    --bg3: #ebebea;
    --text: #1c1c1a;
    --text2: #6b6b68;
    --text3: #9c9a92;
    --border: rgba(0,0,0,0.12);
    --border2: rgba(0,0,0,0.22);
    --info-bg: #e6f1fb;
    --info-text: #185fa5;
    --info-border: rgba(24,95,165,0.3);
    --warn-bg: #faeeda;
    --warn-text: #854f0b;
    --warn-border: rgba(133,79,11,0.3);
    --success-bg: #eaf3de;
    --success-text: #3b6d11;
    --danger-bg: #fcebeb;
    --danger-text: #a32d2d;
    --danger-border: rgba(163,45,45,0.3);
    --radius: 8px;
    --radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a;
      --bg2: #252523;
      --bg3: #2e2e2b;
      --text: #e8e6df;
      --text2: #9c9a92;
      --text3: #6b6b68;
      --border: rgba(255,255,255,0.1);
      --border2: rgba(255,255,255,0.2);
      --info-bg: #0c447c;
      --info-text: #b5d4f4;
      --info-border: rgba(181,212,244,0.3);
      --warn-bg: #633806;
      --warn-text: #fac775;
      --warn-border: rgba(250,199,117,0.3);
      --success-bg: #27500a;
      --success-text: #c0dd97;
      --danger-bg: #791f1f;
      --danger-text: #f7c1c1;
      --danger-border: rgba(247,193,193,0.3);
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 2rem 1rem;
  }
  .card {
    background: var(--bg);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-lg);
    padding: 1.5rem;
    max-width: 600px;
    width: 100%;
  }
  h1 { font-size: 16px; font-weight: 500; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: var(--text2); margin-bottom: 20px; }
  code {
    background: var(--bg2);
    padding: 2px 6px;
    border-radius: 4px;
    font-family: "SF Mono", "Fira Code", monospace;
    font-size: 12px;
  }
  .meta { font-size: 13px; color: var(--text2); margin-bottom: 20px; }

  /* String display */
  #str-display {
    display: flex; gap: 8px; margin: 24px 0 16px; justify-content: center;
  }
  .char-box {
    display: inline-flex; align-items: center; justify-content: center;
    width: 40px; height: 40px; border-radius: var(--radius);
    border: 1.5px solid var(--border2); font-size: 18px; font-weight: 500;
    position: relative; transition: all .2s;
  }
  .char-box.in-window {
    background: var(--info-bg); border-color: var(--info-border);
    color: var(--info-text);
  }
  .char-box.left-ptr::before {
    content: 'L'; position: absolute; top: -20px; left: 50%;
    transform: translateX(-50%); font-size: 11px; color: var(--success-text); font-weight: 500;
  }
  .char-box.right-ptr::after {
    content: 'R'; position: absolute; bottom: -20px; left: 50%;
    transform: translateX(-50%); font-size: 11px; color: var(--danger-text); font-weight: 500;
  }

  /* Set display */
  .row { display: flex; gap: 8px; align-items: center; font-size: 13px; margin-bottom: 12px; }
  .row-label { color: var(--text2); min-width: 80px; }
  .set-box {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 28px; height: 28px; border-radius: var(--radius);
    background: var(--warn-bg); color: var(--warn-text);
    font-size: 13px; font-weight: 500; padding: 0 6px;
    border: 0.5px solid var(--warn-border);
  }
  .muted { color: var(--text3); font-size: 12px; }
  .result-val { font-weight: 500; }

  /* Log */
  .log-box {
    background: var(--bg2); border-radius: var(--radius); padding: 10px 14px;
    margin: 16px 0; min-height: 56px; font-size: 12px; color: var(--text2);
    line-height: 1.6;
  }
  .log-box.found { color: var(--success-text); }
  .log-box.end { color: var(--text); font-weight: 500; }

  /* Buttons */
  .btn-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 20px; }
  .btn {
    padding: 7px 16px; border: 0.5px solid var(--border2); border-radius: var(--radius);
    background: transparent; color: var(--text); cursor: pointer; font-size: 13px;
  }
  .btn:hover { background: var(--bg2); }
  .btn:active { transform: scale(0.98); }
  .btn-primary {
    background: var(--info-bg); color: var(--info-text);
    border-color: var(--info-border);
  }
  .done-label { font-size: 12px; color: var(--text3); }

  /* Bug panel */
  .bug-panel {
    background: var(--danger-bg); border: 0.5px solid var(--danger-border);
    border-radius: var(--radius); padding: 12px 14px;
  }
  .bug-title { font-size: 13px; font-weight: 500; color: var(--danger-text); margin-bottom: 6px; }
  .bug-body { font-size: 12px; color: var(--text2); line-height: 1.7; }
  .bug-body b { color: var(--danger-text); }

  /* Divider */
  hr { border: none; border-top: 0.5px solid var(--border); margin: 20px 0; }
</style>
</head>
<body>
<div class="card">
  <h1>T438 findAnagrams 逻辑演示</h1>
  <p class="subtitle">LeetCode 438 — 滑动窗口逻辑追踪</p>
  <p class="meta">
    测试用例：<code>s = "baa"，p = "aa"</code>
    &nbsp;&nbsp;期望输出：<code>[1]</code>
  </p>

  <div id="str-display"></div>

  <div style="height:28px"></div>

  <div class="row">
    <span class="row-label">当前 set：</span>
    <span id="set-display" style="display:flex;gap:4px;align-items:center"></span>
    <span id="set-empty" class="muted">（空）</span>
  </div>
  <div class="row">
    <span class="row-label">结果列表：</span>
    <span id="result-display" class="result-val"></span>
    <span id="result-empty" class="muted">（空）</span>
  </div>

  <div id="log-box" class="log-box"></div>

  <div class="btn-row">
    <button class="btn btn-primary" onclick="step()">下一步</button>
    <button class="btn" onclick="reset()">重置</button>
    <span id="done-label" class="done-label"></span>
  </div>

  <hr>

  <div class="bug-panel">
    <div class="bug-title">问题所在</div>
    <div class="bug-body" id="bug-hint">运行完毕后查看结论</div>
  </div>
</div>

<script>
const s = "baa";
const p = "aa";
const steps = [];

function simulate(){
  let left=0,right=0;
  const set=new Set();
  const list=[];
  steps.length=0;
  steps.push({left,right,set:new Set(set),list:[...list],action:"初始化：left=0, right=0，set 为空",phase:"init"});
  while(right<s.length){
    const c=s[right];
    if(p.includes(c)){
      if(set.has(c)){
        steps.push({left,right,set:new Set(set),list:[...list],action:`right=${right}，字符 '${c}' 已在 set 里 → 移除 s[${left}]='${s[left]}'，left++ → left=${left+1}，continue（right 不动）`,phase:"dup"});
        set.delete(s[left]);
        left++;
      } else {
        set.add(c);
        right++;
        steps.push({left,right,set:new Set(set),list:[...list],action:`right 指向 '${c}'，不重复 → 加入 set，right++ → right=${right}`,phase:"add"});
        if(set.size===p.length){
          list.push(left);
          steps.push({left,right,set:new Set(set),list:[...list],action:`set.size == p.length → 加入结果 left=${left}`,phase:"found"});
        }
      }
    } else {
      steps.push({left,right,set:new Set(set),list:[...list],action:`right=${right}，字符 '${c}' 不在 p 中 → set.clear()，left 跳到 ${right+1}，right++ → right=${right+1}`,phase:"clear"});
      set.clear();
      left+=(right-left+1);
      right++;
    }
  }
  steps.push({left,right,set:new Set(set),list:[...list],action:`循环结束。最终结果：[${list}]`,phase:"end"});
}
simulate();

let cur=-1;

function render(i){
  const st=steps[i];
  const d=document.getElementById('str-display');
  d.innerHTML='';
  s.split('').forEach((ch,idx)=>{
    const box=document.createElement('div');
    let cls='char-box';
    if(idx>=st.left&&idx<st.right) cls+=' in-window';
    if(idx===st.left) cls+=' left-ptr';
    if(idx===st.right) cls+=' right-ptr';
    box.className=cls;
    box.textContent=ch;
    d.appendChild(box);
  });
  const sd=document.getElementById('set-display');
  const se=document.getElementById('set-empty');
  sd.innerHTML='';
  if(st.set.size===0){se.style.display='';}
  else{
    se.style.display='none';
    st.set.forEach(c=>{
      const el=document.createElement('span');
      el.className='set-box'; el.textContent=c; sd.appendChild(el);
    });
  }
  const rd=document.getElementById('result-display');
  const re=document.getElementById('result-empty');
  if(st.list.length===0){rd.textContent='';re.style.display='';}
  else{re.style.display='none';rd.textContent='['+st.list.join(', ')+']';}

  const lb=document.getElementById('log-box');
  lb.textContent=st.action;
  lb.className='log-box';
  if(st.phase==='found') lb.classList.add('found');
  if(st.phase==='end') lb.classList.add('end');

  if(i===steps.length-1){
    document.getElementById('done-label').textContent='演示完毕';
    document.getElementById('bug-hint').innerHTML=
      '<b>Bug 1</b>：p="aa" 有重复字符，但代码用 HashSet——无法区分"有两个\'a\'"和"有一个\'a\'"。当 set 里已有 \'a\'，代码移走 left 重来，永远无法凑出正确的异位词窗口。<br><br><b>Bug 2</b>：只检查字符种类数量（set.size == p.length），没有验证每种字符的个数是否匹配。<br><br><b>正解</b>：用 int[26] 频率数组 + 固定长度滑动窗口，比较两个字符频率数组是否相等。';
  }
}

function step(){
  if(cur>=steps.length-1) return;
  cur++;render(cur);
}

function reset(){
  cur=-1;
  document.getElementById('str-display').innerHTML='';
  s.split('').forEach(ch=>{
    const box=document.createElement('div');
    box.className='char-box'; box.textContent=ch;
    document.getElementById('str-display').appendChild(box);
  });
  document.getElementById('set-display').innerHTML='';
  document.getElementById('set-empty').style.display='';
  document.getElementById('result-display').textContent='';
  document.getElementById('result-empty').style.display='';
  document.getElementById('log-box').textContent='';
  document.getElementById('log-box').className='log-box';
  document.getElementById('done-label').textContent='';
  document.getElementById('bug-hint').textContent='运行完毕后查看结论';
}

reset();
</script>
</body>
</html>
